name: Multi-Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.8.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtmultimedia'
          cache: true
          cache-key-prefix: 'qt-macos'

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Deploy Qt
        run: |
          # Find macdeployqt from the install-qt-action path
          DEPLOY=$(find "$Qt6_DIR/../../.." -name macdeployqt -type f 2>/dev/null | head -1)
          if [ -z "$DEPLOY" ]; then
            DEPLOY=$(which macdeployqt 2>/dev/null || true)
          fi
          if [ -n "$DEPLOY" ]; then
            "$DEPLOY" build/CritVTT.app -always-overwrite || true
          else
            echo "macdeployqt not found, skipping deployment"
          fi
          codesign --deep --force --sign - build/CritVTT.app || true

      - name: Package
        run: cd build && zip -r CritVTT-macOS.zip CritVTT.app

      - uses: actions/upload-artifact@v7
        with:
          name: CritVTT-macOS
          path: build/CritVTT-macOS.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: microsoft/setup-msbuild@v3

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtmultimedia'
          cache: true
          cache-key-prefix: 'qt-windows'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Deploy Qt
        shell: cmd
        run: |
          cd build\%BUILD_TYPE%
          windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw CritVTT.exe

      - name: Package
        shell: powershell
        run: |
          cd build\${{ env.BUILD_TYPE }}
          Compress-Archive -Path * -DestinationPath ..\CritVTT-Windows-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: CritVTT-Windows-x64
          path: build/CritVTT-Windows-x64.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev libqt6svg6-dev qt6-multimedia-dev \
            libqt6opengl6-dev libgl1-mesa-dev cmake build-essential \
            ninja-build libxcb-xinerama0 libxcb-cursor0

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G Ninja

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p build/CritVTT-Linux
          cp build/CritVTT build/CritVTT-Linux/
          cp -r resources build/CritVTT-Linux/
          cd build && tar -czf CritVTT-Linux-x64.tar.gz CritVTT-Linux/

      - uses: actions/upload-artifact@v7
        with:
          name: CritVTT-Linux-x64
          path: build/CritVTT-Linux-x64.tar.gz
          retention-days: 30
