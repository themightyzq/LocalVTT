name: Multi-Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.7.2'

jobs:
  build-macos:
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtmultimedia'
          cache: true
          cache-key-prefix: 'qt-macos'

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DUSE_MACDEPLOYQT=OFF

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Deploy Qt
        run: |
          macdeployqt build/LocalVTT.app -always-overwrite || true
          codesign --deep --force --sign - build/LocalVTT.app

      - name: Verify
        run: |
          test -f build/LocalVTT.app/Contents/MacOS/LocalVTT
          otool -L build/LocalVTT.app/Contents/MacOS/LocalVTT | grep -v "@rpath\|@executable_path\|/System\|/usr/lib\|:$" && exit 1 || true
          echo "Build OK"

      - name: Package
        run: |
          cd build && zip -r LocalVTT-macOS.zip LocalVTT.app

      - uses: actions/upload-artifact@v4
        with:
          name: LocalVTT-macOS
          path: build/LocalVTT-macOS.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtmultimedia'
          cache: true
          cache-key-prefix: 'qt-windows'

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Deploy Qt
        shell: cmd
        run: |
          cd build\${{ env.BUILD_TYPE }}
          windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw LocalVTT.exe

      - name: Package
        shell: powershell
        run: |
          cd build\${{ env.BUILD_TYPE }}
          Compress-Archive -Path * -DestinationPath ..\LocalVTT-Windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: LocalVTT-Windows-x64
          path: build/LocalVTT-Windows-x64.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev libqt6svg6-dev qt6-multimedia-dev \
            libqt6opengl6-dev libgl1-mesa-dev cmake build-essential \
            ninja-build libxcb-xinerama0 libxcb-cursor0

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -G Ninja

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p build/LocalVTT-Linux
          cp build/LocalVTT build/LocalVTT-Linux/
          cp -r resources build/LocalVTT-Linux/
          cd build && tar -czf LocalVTT-Linux-x64.tar.gz LocalVTT-Linux/

      - uses: actions/upload-artifact@v4
        with:
          name: LocalVTT-Linux-x64
          path: build/LocalVTT-Linux-x64.tar.gz
          retention-days: 30
