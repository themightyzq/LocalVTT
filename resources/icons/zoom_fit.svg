  <!-- Bottom-right corner -->
  <path d="M 16 20 L 20 20 L 20 16" fill="none" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center rectangle representing the content -->
